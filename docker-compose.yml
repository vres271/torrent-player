services:
  amnezia-vpn:
    image: ${WIREGUARD_IMAGE:-metaligh/amneziawg:latest}
    platform: ${PLATFORM:-linux/amd64}
    container_name: amnezia-vpn
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    volumes:
      - ./vpn-user-config/wg0.conf:/config/wg0.conf:ro
      - ./vpn:/vpn:ro
    entrypoint: ["/bin/sh","-c"]
    command:
      - |
        set +e  # ← КРИТИЧНО: НЕ падаем на ошибках
        /vpn/generate-wg0-setconf.sh
        amneziawg-go wg0 || true
        awg setconf wg0 /config/wg0.setconf
        
        # Фикс: жёстко задаём IP из вашего conf
        ip -4 addr add 10.8.0.5/24 dev wg0  # ← Ваш IP!
        ip link set mtu 1420 up dev wg0
        
        # DNS
        echo "nameserver 8.8.8.8" > /etc/resolv.conf
        
        # Маршрут к серверу (109.248.162.130)
        ip route replace 109.248.162.130/32 via $(ip route show default | awk '{print $3}' | head -n1)
        
        # ВЕСЬ ТРАФИК через VPN
        ip route replace default dev wg0
        
        echo "✅ VPN готов! Routes:"
        ip route show
        ip addr show wg0 | grep inet
        tail -f /dev/null


  normal-app:
    build:                        # ❌ Убрали platform
      context: .
      dockerfile: Dockerfile.app
    container_name: normal-app
    restart: unless-stopped
    environment:
      - PORT=3001
      - MODE=NORMAL
    expose:
      - "3001"

  vpn-app:
    build:                        # ❌ Убрали platform  
      context: .
      dockerfile: Dockerfile.app
    container_name: vpn-app
    restart: unless-stopped
    depends_on:
      - amnezia-vpn
    network_mode: service:amnezia-vpn
    environment:
      - PORT=3002
      - MODE=VPN

  webui:
    build:                        # ❌ Убрали platform
      context: .
      dockerfile: Dockerfile.webui
    container_name: webui
    restart: unless-stopped
    depends_on:
      - normal-app
      - amnezia-vpn
    ports:
      - "8089:8080"
    environment:
      - PORT=8080
      - NORMAL_URL=http://normal-app:3001/test
      - VPN_URL=http://amnezia-vpn:3002/test
      - TORAPI_BASE=http://amnezia-vpn:8443
      - QB_URL=http://qbittorrent:8081
      - QB_USER=admin
      - QB_PASS=adminadmin

  # torapi:
  #   image: ${TORAPI_IMAGE:-lifailon/torapi:latest}
  #   container_name: torapi
  #   platform: ${PLATFORM:-linux/amd64}  # ✅ Только для image!
  #   restart: unless-stopped
  #   depends_on:
  #     - amnezia-vpn
  #   network_mode: service:amnezia-vpn

  torapi:
    image: linuxserver/jackett:latest  # ✅ ARMv7 support
    container_name: torapi
    platform: ${PLATFORM:-linux/arm/v7}
    environment:
      - PUID=1000
      - PGID=1000
    volumes:
      - ./jackett-config:/config
    network_mode: service:amnezia-vpn
    depends_on:
      - amnezia-vpn
    restart: unless-stopped

  dl-proxy:
    image: node:20-slim
    container_name: dl-proxy
    platform: ${PLATFORM:-linux/amd64}  # ✅ Только для image!
    restart: unless-stopped
    depends_on:
      - amnezia-vpn
    network_mode: service:amnezia-vpn
    volumes:
      - ./dl-proxy/server.js:/app/server.js:ro
    working_dir: /app
    command: ["/bin/sh", "-ec", "node /app/server.js"]

  qbittorrent:
    image: linuxserver/qbittorrent:latest
    container_name: qbittorrent
    platform: ${PLATFORM:-linux/amd64}  # ✅ Только для image!
    restart: unless-stopped
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Moscow
      - WEBUI_PORT=8081
    volumes:
      - ./torrents:/downloads
      - ./qb-config:/config
    ports:
      - "8081:8081"
      - "6881:6881"
      - "6881:6881/udp"
